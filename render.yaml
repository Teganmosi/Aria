services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: aria-backend
    env: python
    region: ohio # Choose closest to your Upstash Redis
    plan: free # Can be 'free' or 'starter' if you need a disk
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/aria.db
      - key: REDIS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: OPENAI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: REDIS_URL
        sync: false # Set this in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
    # Note: Free tier doesn't support Disks. 
    # If you upgrade to Starter, uncomment below for persistent data:
    # disks:
    #   - name: aria-data
    #     mountPath: /opt/render/project/src/data
    #     sizeGB: 1

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: aria-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aria-backend
          property: url
        # Append /api/v1 to the backend URL
      - key: VITE_WS_URL
        fromService:
          type: web
          name: aria-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
